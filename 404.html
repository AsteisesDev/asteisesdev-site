<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — asteisesdev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --ink: #e8e8ee;
    --ink-dim: #8a8a99;
    --indigo: #6e40ff;
    --cyan: #00d4ff;
    --grad: linear-gradient(90deg, #6e40ff, #00d4ff);
    --line: rgba(255,255,255,0.08);
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f5f5fa; --ink:#0a0a14; --ink-dim:#55556a; --line:rgba(0,0,0,0.08); }
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    display: grid; place-items: center; padding: 24px;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 80%);
  }
  main { text-align: center; position: relative; z-index: 1; }
  .code {
    font-size: clamp(72px, 16vw, 160px);
    font-weight: 700; letter-spacing: -0.05em; line-height: 1;
    background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .msg { color: var(--ink-dim); font-size: 13px; letter-spacing: 0.04em; margin-top: 12px; }
  a {
    display: inline-block; margin-top: 28px;
    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink); text-decoration: none;
    padding: 10px 18px; border: 1px solid var(--line); border-radius: 6px;
    transition: all .2s;
  }
  a:hover { border-color: var(--cyan); box-shadow: 0 0 0 1px var(--cyan), 0 0 20px rgba(0,212,255,0.3); }
</style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <div class="msg">~/not-found</div>
    <a href="/">← back home</a>
  </main>
</body>
</html>
