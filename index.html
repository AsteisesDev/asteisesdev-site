<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>asteisesdev.ru — Directions</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; overflow: hidden; }
  .frame {
    width: 100%; height: 100%;
    border: 0;
    display: block;
    background: #0a0a0f;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const ART_W = 420;
  const ART_H = 900;

  function PageFrame({ src }) {
    return (
      <iframe
        className="frame"
        src={src}
        title={src}
        style={{ width: '100%', height: '100%', border: 0, display: 'block' }}
      />
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="final"
          title="asteisesdev.ru — Final"
          subtitle="Direction A (Terminal) as base + pill dots from B + glass card with LIVE badge from C. Dark by default, auto-light from system."
        >
          <DCArtboard id="final" label="Final · Terminal + B dots + C glass" width={520} height={1040}>
            <PageFrame src="pages/final.html" />
          </DCArtboard>
        </DCSection>
        <DCSection
          id="originals"
          title="Original directions"
          subtitle="For reference — the three earlier explorations."
        >
          <DCArtboard id="terminal" label="A · Terminal" width={ART_W} height={ART_H}>
            <PageFrame src="pages/terminal.html" />
          </DCArtboard>
          <DCArtboard id="grid-signal" label="B · Grid Signal" width={ART_W} height={ART_H}>
            <PageFrame src="pages/grid-signal.html" />
          </DCArtboard>
          <DCArtboard id="glass-stack" label="C · Glass Stack" width={ART_W} height={ART_H}>
            <PageFrame src="pages/glass-stack.html" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
